name: Main CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests - auth-service
        working-directory: ./services/auth-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - user-service
        working-directory: ./services/user-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - follow-service
        working-directory: ./services/follow-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - blok-service
        working-directory: ./services/blok-service
        run: |
          chmod +x mvnw
          ./mvnw test

      # - name: Run tests - feed-service
      #   working-directory: ./services/feed-service
      #   run: |
      #     chmod +x mvnw
      #     ./mvnw test

      - name: Run tests - post-service
        working-directory: ./services/post-service
        run: |
          chmod +x mvnw
          ./mvnw test

      # - name: Run tests - interactive-service
      #   working-directory: ./services/interactive-service
      #   run: |
      #     chmod +x mvnw
      #     ./mvnw test

      - name: Generate image tag
        id: tag
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ steps.tag.outputs.TAG }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
         context: ./services/user-service
         push: true
         tags: ${{ secrets.DOCKER_USERNAME }}/user-service:${{ steps.tag.outputs.TAG }}

      - name: Build and push follow-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/follow-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/follow-service:${{ steps.tag.outputs.TAG }}

      - name: Build and push blok-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/blok-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/blok-service:${{ steps.tag.outputs.TAG }}

      # - name: Build and push feed-service
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./services/feed-service
      #     push: true
      #     tags: ${{ secrets.DOCKER_USERNAME }}/feed-service:${{ steps.tag.outputs.TAG }}

      - name: Build and push post-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/post-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/post-service:${{ steps.tag.outputs.TAG }}

      # - name: Build and push interactive-service
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./services/interactive-service
      #     push: true
      #     tags: ${{ secrets.DOCKER_USERNAME }}/interactive-service:${{ steps.tag.outputs.TAG }}