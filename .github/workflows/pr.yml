name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --run

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests - auth-service
        working-directory: ./services/auth-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - user-service
        working-directory: ./services/user-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - follow-service
        working-directory: ./services/follow-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - blok-service
        working-directory: ./services/blok-service
        run: |
          chmod +x mvnw
          ./mvnw test

      # - name: Run tests - feed-service
      #   working-directory: ./services/feed-service
      #   run: |
      #     chmod +x mvnw
      #     ./mvnw test

      - name: Run tests - post-service
        working-directory: ./services/post-service
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Run tests - interactive-service
        working-directory: ./services/interactive-service
        run: |
          chmod +x mvnw
          ./mvnw test